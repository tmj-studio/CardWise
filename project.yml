name: CardWise
options:
  bundleIdPrefix: com.cardwise
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "K434CK85HW"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  PlaidLink:
    url: https://github.com/plaid/plaid-link-ios
    from: "5.6.0"

targets:
  CardWise:
    type: application
    platform: iOS
    sources:
      - path: CardWise
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: studio.tmj.cardwise
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSCameraUsageDescription: "CardWise uses the camera to scan receipts for quick transaction entry."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "CardWise accesses your photo library to import receipt images."
        INFOPLIST_KEY_CFBundleDisplayName: "CardWise"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.finance"
    resources:
      - path: CardWise/Resources/Assets.xcassets
      - path: CardWise/Resources/Preview Content
      - path: CardWise/GoogleService-Info.plist
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: PlaidLink
        product: LinkKit
      - target: CardWiseWidget
        embed: true
    entitlements:
      path: CardWise/CardWise.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.cardwise.app
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.cardwise.app
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.cardwise.app
        aps-environment: production
    scheme:
      testTargets:
        - CardWiseTests
      storeKitConfiguration: CardWise.storekit

  CardWiseWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: CardWiseWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: studio.tmj.cardwise.widget
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CardWiseWidget/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
    entitlements:
      path: CardWiseWidget/CardWiseWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.cardwise.app

  CardWiseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CardWiseTests
    dependencies:
      - target: CardWise
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: studio.tmj.cardwise.tests
        GENERATE_INFOPLIST_FILE: YES
