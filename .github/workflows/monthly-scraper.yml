name: Monthly Credit Card Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 1 * *"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Functions/scraper/package-lock.json

      - name: Install dependencies
        working-directory: Functions/scraper
        run: npm ci

      - name: Scrape card data
        working-directory: Functions/scraper
        run: npm run scrape

      - name: Validate scraped data
        working-directory: Functions/scraper
        run: npm run validate:file

      - name: Upload to Firestore
        working-directory: Functions/scraper
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT is not set; skipping Firestore upload."
            exit 0
          fi

          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > service-account.json
          npm run upload

      - name: Upload scraped data artifact
        uses: actions/upload-artifact@v4
        with:
          name: scraped-cards
          path: Functions/scraper/scraped-cards.json
