name: iOS Release (TestFlight)

# Every push to `main` builds the app and uploads a new build to TestFlight /
# App Store Connect. The build number auto-increments (highest on TestFlight + 1);
# the marketing version comes from project.yml (MARKETING_VERSION) — bump it there
# to ship a new App Store version. Submission *for review* stays manual in App Store
# Connect. Use the "Run workflow" button (workflow_dispatch) to rebuild on demand.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   ASC_KEY_ID            App Store Connect API key ID
#   ASC_ISSUER_ID         App Store Connect API issuer ID
#   ASC_KEY_P8_BASE64     the .p8 key file, base64-encoded
#   DIST_CERT_P12_BASE64  Apple Distribution cert + private key (.p12), base64-encoded
#   DIST_CERT_PASSWORD    password for the .p12 (empty string if none)

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'Screenshots/**'
      - 'AppStore/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

# Never run two uploads at once — a second build would race the build-number bump.
concurrency:
  group: ios-release
  cancel-in-progress: false

jobs:
  testflight:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode (26+)
        # Apple now rejects uploads built with anything older than the iOS 26 SDK
        # ("must be built with the iOS 26 SDK or later, included in Xcode 26"), so
        # pick the newest Xcode 26.x on the runner (falling back to the newest
        # installed Xcode if the naming ever changes).
        run: |
          latest=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          [ -z "$latest" ] && latest=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $latest"
          sudo xcode-select -s "$latest"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Decode signing assets
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
        run: |
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist_cert.p12"
          echo "DIST_CERT_P12_PATH=$RUNNER_TEMP/dist_cert.p12" >> "$GITHUB_ENV"

      - name: Set up Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build & upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          # Upload via the Java iTMSTransporter instead of Xcode 26's altool. The
          # Xcode 26 altool regressed and cannot build the App Store Connect auth JWT
          # from a valid API key — it dies with "Failed to generate JWT token …
          # NSCocoaErrorDomain Code=259 (isn't in the correct format)" before uploading.
          # The shell-script transporter has its own (working) JWT handling.
          FASTLANE_ITUNES_TRANSPORTER_USE_SHELL_SCRIPT: "true"
        run: bundle exec fastlane beta

      - name: Clean up signing assets
        if: always()
        run: rm -f "$RUNNER_TEMP/dist_cert.p12"
